name: Gold & Silver signal check

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (GitHub may delay this under load)
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

permissions:
  contents: write            # needed to commit the "already notified" state file

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check for confirmed signals and notify via Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          MIN_PIPS: ${{ secrets.MIN_PIPS }}
          MAX_PIPS: ${{ secrets.MAX_PIPS }}
        run: node scripts/check-signals.mjs

      - name: Commit updated notification state
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "zone-signals-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/last-notified.json
            git commit -m "chore: update last-notified signal state [skip ci]"
            git push
          else
            echo "No state change, nothing to commit."
          fi
